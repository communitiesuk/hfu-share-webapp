<table class="govuk-table">
    <thead class="govuk-table__head">
        <tr class="govuk-table__row">
            <th scope="col" class="govuk-table__header">Files</th>
            <th scope="col" class="govuk-table__header govuk-!-width-one-quarter">
                <span class="govuk-visually-hidden">Download links</span>
            </th>
        </tr>
    </thead>
    <tbody class="govuk-table__body">
        <tr class="govuk-table__row">
            <td class="govuk-table__header">{{ filename }}</td>
            <td class="govuk-table__cell govuk-!-width-one-quarter">
                <a href="{{ download_url }}"
                   class="govuk-link govuk-link--no-visited-state">Download file</a>
            </td>
        </tr>
    </tbody>
</table>
